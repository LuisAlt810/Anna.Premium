name: 🛡️ Anna Premium Deploy

on:
push:
branches: [ "main" ]
workflow_dispatch:

permissions:
contents: read
pages: write
id-token: write

concurrency:
group: "anna-pages"
cancel-in-progress: false

jobs:

anna-start:
name: 🛡️ Anna Boot Sequence
runs-on: ubuntu-latest
steps:
- name: Anna startup message
run: |
echo "Checking for view Access..."
sleep 1
echo "Granting owner Zelda_Life permissions..."
sleep 1
echo "Granting owner luisthegoat7301 permissions..."
sleep 1
echo "Loaded! Premium bot of Anna-the-Guardian."
echo "Update 1.13 detected"
echo "76 Commands Total"
echo "Shop SKUs Enabled"

anna-check:
name: 🔎 Anna Code Check
runs-on: ubuntu-latest
needs: anna-start
steps:
- uses: actions/checkout@v4

```
  - name: Check website files
    run: |
      echo "Scanning Anna website files..."
      ls -la
      if [ ! -f index.html ]; then
        echo "❌ index.html missing!"
        exit 1
      fi
      echo "✅ index.html found"
```

anna-stats:
name: 📊 Anna Stats Job
runs-on: ubuntu-latest
needs: anna-check
steps:
- uses: actions/checkout@v4

```
  - name: Display Anna info
    run: |
      echo "Anna-the-Guardian Premium"
      echo "Version: 1.13"
      echo "Commands: 76"
      echo "Owners:"
      echo "- Zelda_Life"
      echo "- luisthegoat7301"
      echo "SKUs shop enabled"
```

build:
name: 🏗️ Build Anna Website
runs-on: ubuntu-latest
needs: anna-stats
steps:
- uses: actions/checkout@v4

```
  - name: Prepare site
    run: |
      mkdir -p dist
      cp index.html dist/
      echo "Anna site prepared."

  - name: Upload artifact
    uses: actions/upload-pages-artifact@v3
    with:
      path: dist
```

deploy:
name: 🚀 Deploy Anna to GitHub Pages
environment:
name: github-pages
url: ${{ steps.deployment.outputs.page_url }}
runs-on: ubuntu-latest
needs: build

```
steps:
  - name: Deploy
    id: deployment
    uses: actions/deploy-pages@v4
```

anna-finish:
name: ✅ Anna Deployment Complete
runs-on: ubuntu-latest
needs: deploy
steps:
- name: Final message
run: |
echo "🛡️ Anna-the-Guardian Premium deployed!"
echo "Website ready."
echo "Owners: Zelda_Life & luisthegoat7301"
echo "Update 1.13 live."
